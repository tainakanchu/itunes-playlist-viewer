name: CI

# PR と main への push 用の軽量チェック。
# フル多 OS ビルド + インストーラ生成 + GitHub Release は tag のとき release.yml が行う。
# ここでは「コンパイルが通るか + テストが緑か + 型が通るか」だけを速く確認する。
on:
  push:
    branches: [main, master]
    # アプリのコードに無関係な変更 (docs / plugins / .claude 等) では走らせない。
    paths:
      - "src/**"
      - "src-tauri/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig*.json"
      - "vite.config.ts"
      - "index.html"
      - ".github/workflows/**"
  pull_request:
    branches: [main, master]
    paths:
      - "src/**"
      - "src-tauri/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig*.json"
      - "vite.config.ts"
      - "index.html"
      - ".github/workflows/**"
  workflow_dispatch:

# 同一 ref で実行中の古いチェックはキャンセルする (PR への push し直しなど)。
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Linux: フロントをビルド (型チェック + generate_context! 用の dist 生成) し、Rust のテストを走らせる。
  # バンドル (AppImage/deb) や成果物アップロードはしない。
  check-linux:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # tauri (webkit2gtk-4.1) + rodio(ALSA) + discid(libdiscid) のビルド/リンク依存。
      # patchelf は AppImage 用なのでここでは不要。
      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            libdiscid-dev \
            libxdo-dev \
            libssl-dev \
            pkg-config \
            libdbus-1-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # 頻繁に走る CI 用の安定キャッシュ。OS/rustc は rust-cache が自動で鍵に含めるため
      # 全 CI ジョブで同じ shared-key にしても Linux/Windows は別キャッシュになる。
      # release ビルド (tag 時・release profile) とは分け、debug/release のスラッシュを避ける。
      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: ci

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      # tsc -b + vite build。型チェックと、tauri の generate_context! が要求する
      # ../dist の生成を兼ねる (これが無いと cargo がコンパイルできない)。
      - name: Build frontend (typecheck + dist)
        run: pnpm build

      - name: Cargo test
        working-directory: src-tauri
        run: cargo test

  # Windows: Windows 固有のコンパイル崩れを cargo check で安く検知する (バンドルはしない)。
  check-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: ci

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      # generate_context! が ../dist を要求するため、check でもフロントビルドは必要。
      - name: Build frontend (dist)
        run: pnpm build

      - name: Cargo check
        working-directory: src-tauri
        run: cargo check
