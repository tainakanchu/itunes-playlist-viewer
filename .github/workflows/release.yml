name: Release (full build + GitHub Release)

# tag (v*) と手動実行のときだけフル多 OS ビルド + インストーラ生成 + GitHub Release を行う。
# PR / main push の軽量チェック (コンパイル + テスト) は ci.yml が担当する。
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write  # Needed for creating releases on tag push

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # `version` is intentionally omitted so pnpm/action-setup reads it from
        # the `packageManager` field in package.json (single source of truth).

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Frontend typecheck
        run: pnpm typecheck

      # ffmpeg はもう同梱しない。アプリが初回利用時に上流 (BtbN) から取得し、
      # %LOCALAPPDATA% にキャッシュする（更新で消えない・配布物が軽量・GPL 再配布も回避）。

      - name: Tauri build (release)
        run: pnpm tauri build
        env:
          # Tauri 2 picks these up; keep the binary lean.
          CARGO_TERM_COLOR: always

      # ポータブル配布: 標準 exe ＋ ポータブル判定マーカー (portable.txt) を zip 化。
      # アプリ内アップデートはこの zip を取得して exe を自己差し替えする。
      - name: Create portable zip
        shell: pwsh
        run: |
          $ver = (Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json).version
          $dir = "portable_pkg"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          Copy-Item src-tauri/target/release/crateforge.exe "$dir/crateforge.exe" -Force
          Set-Content -Path "$dir/portable.txt" -Encoding utf8 -Value @(
            "Crateforge (portable)",
            "",
            "Keep crateforge.exe and portable.txt together in the same folder.",
            "In-app updates replace this exe directly (no installer needed).",
            "ffmpeg is fetched on first conversion and kept across updates."
          )
          $zip = "Crateforge_${ver}_x64_portable.zip"
          Compress-Archive -Path "$dir/*" -DestinationPath $zip -Force
          Write-Host "Created $zip"

      - name: Show built artifacts
        shell: pwsh
        run: |
          Write-Host "=== Standalone exe ==="
          Get-ChildItem src-tauri\target\release\*.exe | Format-Table Name, Length
          Write-Host "=== Portable zip ==="
          Get-ChildItem Crateforge_*_x64_portable.zip -ErrorAction SilentlyContinue | Format-Table Name, Length
          Write-Host "=== MSI ==="
          Get-ChildItem -Recurse src-tauri\target\release\bundle\msi\*.msi -ErrorAction SilentlyContinue | Format-Table Name, Length
          Write-Host "=== NSIS ==="
          Get-ChildItem -Recurse src-tauri\target\release\bundle\nsis\*.exe -ErrorAction SilentlyContinue | Format-Table Name, Length

      - name: Upload standalone exe
        uses: actions/upload-artifact@v4
        with:
          name: crateforge-windows-exe
          path: src-tauri/target/release/crateforge.exe
          if-no-files-found: error
          retention-days: 30

      - name: Upload portable zip
        uses: actions/upload-artifact@v4
        with:
          name: crateforge-windows-portable
          path: Crateforge_*_x64_portable.zip
          if-no-files-found: error
          retention-days: 30

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: crateforge-windows-installers
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
          retention-days: 30

  # === Linux: AppImage + deb（手動 DL 用。アプリ内自動更新は Windows 専用のまま）===
  build-linux:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Tauri 2 (webkit2gtk-4.1) + rodio(ALSA) + discid(libdiscid) のビルド/リンク依存。
      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libasound2-dev \
            libdiscid-dev \
            libxdo-dev \
            libssl-dev \
            pkg-config \
            libdbus-1-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Frontend typecheck
        run: pnpm typecheck

      - name: Tauri build (release)
        run: pnpm tauri build
        env:
          # GitHub ランナーは FUSE 無しのことがあるため、appimagetool を展開実行させる。
          APPIMAGE_EXTRACT_AND_RUN: "1"

      - name: Show built artifacts
        run: |
          echo "=== AppImage ==="; ls -la src-tauri/target/release/bundle/appimage/ || true
          echo "=== deb ==="; ls -la src-tauri/target/release/bundle/deb/ || true

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: crateforge-linux
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: warn
          retention-days: 30

  # === macOS: Apple Silicon (arm64) をネイティブビルド（未署名・手動 DL 用）===
  # Intel (macos-13) は GitHub ホストランナーの枯渇でキュー待ちのまま 24h ハングして
  # cancelled になる事象が頻発するため配布対象から外した（Intel Mac 自体も EOL 進行中）。
  # ユニバーサルにしないのは、libdiscid が brew で片アーキしか入らずクロスリンクが
  # 失敗するため。ネイティブビルドなら一致する libdiscid をリンクできる。
  build-macos:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14   # Apple Silicon (arm64)
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install libdiscid (CD disc id)
        run: brew install libdiscid

      - name: Configure pkg-config for libdiscid
        run: echo "PKG_CONFIG_PATH=$(brew --prefix)/lib/pkgconfig" >> "$GITHUB_ENV"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Frontend typecheck
        run: pnpm typecheck

      # 未署名ビルド（Gatekeeper 警告は出るが配布可能）。
      - name: Tauri build (native, unsigned)
        run: pnpm tauri build

      - name: Show built artifacts
        run: |
          echo "=== dmg ==="; ls -la src-tauri/target/release/bundle/dmg/ || true

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: crateforge-macos-${{ matrix.runner }}
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: warn
          retention-days: 30

  # === Release: 全プラットフォームのビルド完了後に「一度だけ」作成する ===
  # 各ビルドジョブが個別に softprops を呼ぶと、最初に終わった OS が exe / portable
  # zip 未添付のまま Release を publish してしまい、アプリ内アップデータが「新版あり・
  # でも落とせない」状態を一瞬見てしまう。全ビルドの完了を待ち、かつ Windows ビルド
  # (アップデータが参照する portable zip / exe を生成) が成功していることを必須にして、
  # 全 OS のアセットを揃えてから 1 回だけ Release を作成する。
  # always() なので macOS / Linux が失敗しても Windows さえ通れば公開する
  # (これらは手動 DL 用で、アプリ内アップデータには影響しないため)。
  release:
    needs: [build, build-linux, build-macos]
    if: ${{ always() && startsWith(github.ref, 'refs/tags/v') && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Extract changelog section for this tag
        shell: bash
        run: |
          tag="${{ github.ref_name }}"
          body="Release $tag"
          if [ -f CHANGELOG.md ]; then
            # `## [<tag>] ...` から次の `## [` 直前まで（= このバージョンの節）を抜き出す。
            section="$(awk -v hdr="## [$tag]" '
              index($0, hdr) == 1 { grab = 1; print; next }
              grab && /^## \[/   { exit }
              grab               { print }
            ' CHANGELOG.md)"
            if [ -n "$section" ]; then body="$section"; fi
          fi
          printf '%s\n' "$body" > release_body.md
          echo "----- release body -----"
          cat release_body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # CHANGELOG の該当節を本文に、その下に自動生成の "What's Changed" を付与。
          body_path: release_body.md
          generate_release_notes: true
          # download-artifact が各アーティファクトを release-assets/<name>/ 配下へ展開する。
          files: release-assets/**/*
          fail_on_unmatched_files: false
          draft: false
          # タグに `-` (例 v0.7.0-alpha.1) を含むプレリリースは GitHub の prerelease として
          # 公開する。アプリ内アップデータは /releases/latest を見る＝prerelease を拾わないので
          # 一般ユーザーには配られず、Releases ページから手動で取得してテストできる。
          prerelease: ${{ contains(github.ref_name, '-') }}
