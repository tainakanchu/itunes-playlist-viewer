name: Build Windows

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write  # Needed for creating releases on tag push

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # `version` is intentionally omitted so pnpm/action-setup reads it from
        # the `packageManager` field in package.json (single source of truth).

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Frontend typecheck
        run: pnpm typecheck

      # ffmpeg はもう同梱しない。アプリが初回利用時に上流 (BtbN) から取得し、
      # %LOCALAPPDATA% にキャッシュする（更新で消えない・配布物が軽量・GPL 再配布も回避）。

      - name: Tauri build (release)
        run: pnpm tauri build
        env:
          # Tauri 2 picks these up; keep the binary lean.
          CARGO_TERM_COLOR: always

      # ポータブル配布: 標準 exe ＋ ポータブル判定マーカー (portable.txt) を zip 化。
      # アプリ内アップデートはこの zip を取得して exe を自己差し替えする。
      - name: Create portable zip
        shell: pwsh
        run: |
          $ver = (Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json).version
          $dir = "portable_pkg"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          Copy-Item src-tauri/target/release/crateforge.exe "$dir/crateforge.exe" -Force
          Set-Content -Path "$dir/portable.txt" -Encoding utf8 -Value @(
            "Crateforge (portable)",
            "",
            "Keep crateforge.exe and portable.txt together in the same folder.",
            "In-app updates replace this exe directly (no installer needed).",
            "ffmpeg is fetched on first conversion and kept across updates."
          )
          $zip = "Crateforge_${ver}_x64_portable.zip"
          Compress-Archive -Path "$dir/*" -DestinationPath $zip -Force
          Write-Host "Created $zip"

      - name: Show built artifacts
        shell: pwsh
        run: |
          Write-Host "=== Standalone exe ==="
          Get-ChildItem src-tauri\target\release\*.exe | Format-Table Name, Length
          Write-Host "=== Portable zip ==="
          Get-ChildItem Crateforge_*_x64_portable.zip -ErrorAction SilentlyContinue | Format-Table Name, Length
          Write-Host "=== MSI ==="
          Get-ChildItem -Recurse src-tauri\target\release\bundle\msi\*.msi -ErrorAction SilentlyContinue | Format-Table Name, Length
          Write-Host "=== NSIS ==="
          Get-ChildItem -Recurse src-tauri\target\release\bundle\nsis\*.exe -ErrorAction SilentlyContinue | Format-Table Name, Length

      - name: Upload standalone exe
        uses: actions/upload-artifact@v4
        with:
          name: crateforge-windows-exe
          path: src-tauri/target/release/crateforge.exe
          if-no-files-found: error
          retention-days: 30

      - name: Upload portable zip
        uses: actions/upload-artifact@v4
        with:
          name: crateforge-windows-portable
          path: Crateforge_*_x64_portable.zip
          if-no-files-found: error
          retention-days: 30

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: crateforge-windows-installers
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
          retention-days: 30

      - name: Extract changelog section for this tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $body = "Release $tag"
          if (Test-Path CHANGELOG.md) {
            $content = Get-Content CHANGELOG.md -Raw
            # `## [<tag>] ...` から次の `## [` 直前まで（= このバージョンの節）を抜き出す。
            $pattern = "(?ms)^##\s*\[$([regex]::Escape($tag))\].*?(?=^##\s*\[|\z)"
            $m = [regex]::Match($content, $pattern)
            if ($m.Success) { $body = $m.Value.Trim() }
          }
          $body | Out-File -FilePath release_body.md -Encoding utf8
          Write-Host "----- release body -----"
          Write-Host $body

      - name: Create GitHub Release (tag only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          # CHANGELOG の該当節を本文に、その下に自動生成の "What's Changed" を付与。
          body_path: release_body.md
          generate_release_notes: true
          files: |
            Crateforge_*_x64_portable.zip
            src-tauri/target/release/crateforge.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          draft: false
          prerelease: false
