name: Build Windows

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write  # Needed for creating releases on tag push

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Frontend typecheck
        run: pnpm typecheck

      - name: Tauri build (release)
        run: pnpm tauri build
        env:
          # Tauri 2 picks these up; keep the binary lean.
          CARGO_TERM_COLOR: always

      - name: Show built artifacts
        shell: pwsh
        run: |
          Write-Host "=== Standalone exe ==="
          Get-ChildItem src-tauri\target\release\*.exe | Format-Table Name, Length
          Write-Host "=== MSI ==="
          Get-ChildItem -Recurse src-tauri\target\release\bundle\msi\*.msi -ErrorAction SilentlyContinue | Format-Table Name, Length
          Write-Host "=== NSIS ==="
          Get-ChildItem -Recurse src-tauri\target\release\bundle\nsis\*.exe -ErrorAction SilentlyContinue | Format-Table Name, Length

      - name: Upload standalone exe
        uses: actions/upload-artifact@v4
        with:
          name: itunes-playlist-viewer-windows-exe
          path: src-tauri/target/release/itunes-playlist-viewer.exe
          if-no-files-found: error
          retention-days: 30

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: itunes-playlist-viewer-windows-installers
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
          retention-days: 30

      - name: Create GitHub Release (tag only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            src-tauri/target/release/itunes-playlist-viewer.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          draft: false
          prerelease: false
