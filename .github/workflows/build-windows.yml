name: Build Windows

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write  # Needed for creating releases on tag push

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # `version` is intentionally omitted so pnpm/action-setup reads it from
        # the `packageManager` field in package.json (single source of truth).

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Frontend typecheck
        run: pnpm typecheck

      # 変換機能 (ffmpeg) を箱から動かすため、static な ffmpeg.exe を
      # resource として同梱する (tauri.windows.conf.json で参照)。
      - name: Bundle ffmpeg (for audio conversion)
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_dl -Force
          $exe = Get-ChildItem -Recurse ffmpeg_dl -Filter ffmpeg.exe | Select-Object -First 1
          if (-not $exe) { throw "ffmpeg.exe not found in the downloaded archive" }
          Copy-Item $exe.FullName src-tauri\ffmpeg.exe -Force
          $size = [math]::Round((Get-Item src-tauri\ffmpeg.exe).Length / 1MB, 1)
          Write-Host "Bundled ffmpeg.exe ($size MB)"

      - name: Tauri build (release)
        run: pnpm tauri build
        env:
          # Tauri 2 picks these up; keep the binary lean.
          CARGO_TERM_COLOR: always

      - name: Show built artifacts
        shell: pwsh
        run: |
          Write-Host "=== Standalone exe ==="
          Get-ChildItem src-tauri\target\release\*.exe | Format-Table Name, Length
          Write-Host "=== MSI ==="
          Get-ChildItem -Recurse src-tauri\target\release\bundle\msi\*.msi -ErrorAction SilentlyContinue | Format-Table Name, Length
          Write-Host "=== NSIS ==="
          Get-ChildItem -Recurse src-tauri\target\release\bundle\nsis\*.exe -ErrorAction SilentlyContinue | Format-Table Name, Length

      - name: Upload standalone exe
        uses: actions/upload-artifact@v4
        with:
          name: crateforge-windows-exe
          path: src-tauri/target/release/crateforge.exe
          if-no-files-found: error
          retention-days: 30

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: crateforge-windows-installers
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
          retention-days: 30

      - name: Extract changelog section for this tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $body = "Release $tag"
          if (Test-Path CHANGELOG.md) {
            $content = Get-Content CHANGELOG.md -Raw
            # `## [<tag>] ...` から次の `## [` 直前まで（= このバージョンの節）を抜き出す。
            $pattern = "(?ms)^##\s*\[$([regex]::Escape($tag))\].*?(?=^##\s*\[|\z)"
            $m = [regex]::Match($content, $pattern)
            if ($m.Success) { $body = $m.Value.Trim() }
          }
          $body | Out-File -FilePath release_body.md -Encoding utf8
          Write-Host "----- release body -----"
          Write-Host $body

      - name: Create GitHub Release (tag only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          # CHANGELOG の該当節を本文に、その下に自動生成の "What's Changed" を付与。
          body_path: release_body.md
          generate_release_notes: true
          files: |
            src-tauri/target/release/crateforge.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          draft: false
          prerelease: false
