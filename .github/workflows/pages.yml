name: Deploy Site (LP + Docs) to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "site/**"
      - "website/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: website/pnpm-lock.yaml

      # ドキュメント (Astro + Starlight) を website/ でビルド → website/dist。
      - name: Install docs deps
        working-directory: website
        run: pnpm install --frozen-lockfile

      - name: Build docs (Astro + Starlight)
        working-directory: website
        run: pnpm build

      # LP(site/) をルート、ドキュメント(website/dist) を /docs/ 配下に合成する。
      - name: Assemble site (LP at root, docs under /docs)
        run: |
          rm -rf _site
          mkdir -p _site/docs
          cp -r site/. _site/
          cp -r website/dist/. _site/docs/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
